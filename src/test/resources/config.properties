# Browser selection (chrome is the only supported option for MVP)
browser=chrome

# Base URL for your test application
baseUrl=

# OpenAI model to use — gpt-4o-mini supports vision (screenshot-based healing)
openai.model=gpt-4o-mini

# OpenAI API Key
# Set the OPENAI_API_KEY environment variable.
# To safely use config file for Local execution ONLY (Do NOT commit): replace below with your key.
openai.apiKey=${OPENAI_API_KEY}

# Set to false to disable AI healing and let tests fail normally
healing.enabled=true

# Minimum confidence required to accept an AI suggestion (0.0 to 1.0)
healing.confidence.threshold=0.85
